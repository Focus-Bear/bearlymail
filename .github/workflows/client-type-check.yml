# ⚠️  PROPOSED WORKFLOW — NOT YET ACTIVE
#
# To activate: move this file to .github/workflows/client-type-check.yml
# Jeremy must do this manually (the GitHub App lacks permission to push
# directly to .github/workflows/).
#
# Purpose: Run `tsc --noEmit` in CI so missing imports (e.g. forgetting to
# call `useTranslation()` before using `t()`) are caught before they reach
# production, even though ESLint's `no-undef` is disabled for TypeScript
# files (because TS itself is supposed to catch undefined names).
#
# Fixes: #941 (root cause of #940 "useRef is not defined" and #953 "t is not
# defined" slipping past CI into production).

name: Client Type Check

on:
  push:
    branches: ["main"]
    paths:
      - "client/**"
  pull_request:
    branches: ["main"]
    paths:
      - "client/**"

jobs:
  type-check:
    name: Client Type Check (tsc --noEmit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: |
          cd client
          npm ci

      - name: Run TypeScript type check
        run: |
          cd client
          npm run type-check
