server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted assets; never cache the HTML shell.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — every unknown path serves index.html so client-side
    # routing (React Router) works on hard refresh / deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
