      subject: "Your Slack digest: 3 unread messages in #team-general"
      body: "You have 3 unread messages in #team-general on the Focus Bear Slack workspace. Topics include upcoming team offsite planning, public holiday policy reminder, and a new hire announcement. View in Slack: https://focusbear.slack.com"
      emailCategories: |
           1. "HR Admin": HR communications, admin tasks, internal company matters, policies
           2. "Slack messages": Notifications and digests from Slack
           3. "Newsletters": Marketing emails, digests, promotional content
           4. "Customer Support": Support requests, customer issues
      urgentContext: ""
      notUrgentContext: ""
      goalsContext: ""
      workingOnContext: ""
      dontCareContext: ""
      currentDate: "Monday, March 23, 2026"
    assert:
      - type: javascript
        value: |
          const parsed = typeof output === 'string'
            ? JSON.parse(output.trim().replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/\s*```$/i, '').trim())
            : output;
          const result = parsed?.result;
          if (!result || typeof result.categoryNumber !== 'number') {
            throw new Error("Expected result.categoryNumber, got: " + JSON.stringify(parsed));
          }
          // Hard failure: Slack digest must NOT be treated as HR Admin content
          if (result.categoryNumber === 1) {
            throw new Error(`Slack digest misclassified as "HR Admin". Platform identity (Slack) must take priority. Explanation: ${result.categoryExplanation}`);
          }
          // Accept 2 "Slack messages" (preferred) OR 3 "Newsletters" (defensible digest)
          return true;

  # Test 11: GitHub issue about a feature request → GitHub category, NOT "Customer feedback" (platform > topic)
  - description: "GitHub issue notification about feature request — platform (GitHub) beats topic (customer feedback)"
    vars:
      fromName: "notifications@github.com"
      subject: "[Focus-Bear/BearlyMail] Feature request: Dark mode support (#999)"
      body: "A new GitHub issue was opened by user@example.com requesting dark mode support for BearlyMail. The user describes wanting a dark theme for use at night. View on GitHub: https://github.com/Focus-Bear/BearlyMail/issues/999"
      emailCategories: |
           1. "Customer feedback": Feature requests and feedback submitted directly by customers via email or feedback forms — NOT via GitHub issues
           2. "GitHub bot notifications": Automated notifications from GitHub bots and CI/CD systems
           3. "New GitHub issues (human-created)": New issues opened on GitHub by humans
           4. "Customer Support": Direct support requests from customers
      urgentContext: ""
      notUrgentContext: ""
      goalsContext: ""
      workingOnContext: ""
      dontCareContext: ""
      currentDate: "Monday, March 23, 2026"
    assert:
      - type: javascript
        value: |
          const parsed = typeof output === 'string'
            ? JSON.parse(output.trim().replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/\s*```$/i, '').trim())
            : output;
          const result = parsed?.result;
          if (!result || typeof result.categoryNumber !== 'number') {
            throw new Error("Expected result.categoryNumber, got: " + JSON.stringify(parsed));
          }
          // Hard failure: the category explicitly states "NOT via GitHub issues"
          if (result.categoryNumber === 1) {
            throw new Error(`GitHub feature request misclassified as "Customer feedback". The category says "NOT via GitHub issues" — platform identity must take precedence. Explanation: ${result.categoryExplanation}`);
          }
          // Accept 3 (preferred), 2, or 4. Only exclude the explicitly wrong category.
          return true;

  # Test 12: Dependabot PR (GitHub) → "GitHub bot notifications", NOT "Code reviews by human developers"
  - description: "Dependabot dependency update PR — automated bot, not a human code review"
    vars:
      fromName: "notifications@github.com"
      subject: "[Focus-Bear/BearlyMail] Bump lodash from 4.17.20 to 4.17.21 (#1001)"
      body: "Dependabot opened a pull request to bump lodash from 4.17.20 to 4.17.21 to fix a known prototype pollution vulnerability. Automated security update. View on GitHub: https://github.com/Focus-Bear/BearlyMail/pull/1001"
      emailCategories: |
           1. "Code reviews by human developers": Pull requests opened or reviewed by human developers — NOT bots
           2. "GitHub bot notifications": Automated notifications from GitHub bots and CI/CD systems
           3. "Devin PRs": Pull requests created by Devin AI
           4. "Security & Compliance": Security alerts, compliance issues
      urgentContext: ""
      notUrgentContext: ""
      goalsContext: ""
      workingOnContext: ""
      dontCareContext: ""
      currentDate: "Monday, March 23, 2026"
    assert:
      - type: javascript
        value: |
          const parsed = typeof output === 'string'
            ? JSON.parse(output.trim().replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/\s*```$/i, '').trim())
            : output;
          const result = parsed?.result;
          if (!result || typeof result.categoryNumber !== 'number') {
            throw new Error("Expected result.categoryNumber, got: " + JSON.stringify(parsed));
          }
          // Hard failure: Dependabot is a bot — can NEVER be in a "code reviews by humans" category
          if (result.categoryNumber === 1) {
            throw new Error(`Dependabot PR misclassified as "Code reviews by human developers". Dependabot is a bot — not eligible for human developer category. Explanation: ${result.categoryExplanation}`);
          }
          // Accept 2 (preferred), 4 (security fix — reasonable), or 3 (marginal).
          return true;
