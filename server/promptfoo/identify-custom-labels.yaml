description: "Tests for custom label identification prompt used in email scanning"

prompts:
  - file://prompts/identify-custom-labels.md 

providers:

  - id: google:gemini-3.1-flash-lite
    config:
      temperature: 0
tests:
  - description: "Should identify custom project labels"
    vars:
      labels: |
        INBOX
        SENT
        Project Alpha
        Website Redesign
        UNREAD
    assert:
      - type: javascript
        value: |
          const text = typeof output === 'string' ? output : JSON.stringify(output);
          try {
            const start = text.indexOf('[');
            const end = text.lastIndexOf(']');
            if (start === -1) throw new Error("No JSON array found");
            const parsed = JSON.parse(text.slice(start, end + 1));
            return Array.isArray(parsed) && parsed.length === 2 && 
                   parsed.some(item => item.label === 'Project Alpha' && item.confidence === 'HIGH');
          } catch (e) { throw new Error(`Fail: ${e.message}`); }

  

  - description: "Should identify client/company labels"
    vars:
      labels: |
        INBOX
        Acme Corp
        Client Smith
        Partner XYZ
        SENT
    assert:
      - type: javascript
        value: |
          const text = typeof output === 'string' ? output : JSON.stringify(output);
          try {
            const start = text.indexOf('[');
            const end = text.lastIndexOf(']');
            const parsed = JSON.parse(text.slice(start, end + 1));
            return Array.isArray(parsed) && parsed.length === 3 && 
                   parsed.every(item => ['HIGH', 'MEDIUM', 'LOW'].includes(item.confidence));
          } catch (e) { throw new Error(`Fail: ${e.message}`); }

  - description: "Should identify topic/workflow labels"
    vars:
      labels: |
        Invoices
        Travel
        Legal
        To Review
        Follow Up
        Urgent
        CATEGORY_UPDATES
    assert:
      - type: javascript
        value: |
          const text = typeof output === 'string' ? output : JSON.stringify(output);
          try {
            const start = text.indexOf('[');
            const end = text.lastIndexOf(']');
            const parsed = JSON.parse(text.slice(start, end + 1));
            return Array.isArray(parsed) && parsed.length === 6 && 
                   parsed.some(item => item.label === 'Invoices' && item.categoryName.includes('💰'));
          } catch (e) { throw new Error(`Fail: ${e.message}`); }

  - description: "Should filter out BearlyMail-created labels"
    vars:
      labels: |
        SnoozedBearlyMail
        VA-to-action
        BearlyMail-Blocked
        Project Alpha
        Client Work
        INBOX
    assert:
      - type: javascript
        value: |
          const text = typeof output === 'string' ? output : JSON.stringify(output);
          try {
            const start = text.indexOf('[');
            const end = text.lastIndexOf(']');
            const parsed = JSON.parse(text.slice(start, end + 1));
            return Array.isArray(parsed) && parsed.length === 2 && 
                   !parsed.some(item => item.label.includes('BearlyMail') || item.label.includes('VA-'));
          } catch (e) { throw new Error(`Fail: ${e.message}`); }

  - description: "Should handle mixed case and spaces"
    vars:
      labels: |
        inbox
        Marketing Campaign 2024
        Q1 Budget Review
        sent
    assert:
      - type: javascript
        value: |
          const text = typeof output === 'string' ? output : JSON.stringify(output);
          try {
            const start = text.indexOf('[');
            const end = text.lastIndexOf(']');
            const parsed = JSON.parse(text.slice(start, end + 1));
            return Array.isArray(parsed) && parsed.length === 2 && 
                   parsed.every(item => item.categoryName && item.categoryName.length > 0);
          } catch (e) { throw new Error(`Fail: ${e.message}`); }

  - description: "Should add emoji prefixes appropriately"
    vars:
      labels: |
        Invoices
        Legal Documents
        Travel Expenses
        Project Alpha
    assert:
      - type: javascript
        value: |
          const text = typeof output === 'string' ? output : JSON.stringify(output);
          try {
            const start = text.indexOf('[');
            const end = text.lastIndexOf(']');
            const parsed = JSON.parse(text.slice(start, end + 1));
            return parsed.every(item => item.categoryName.match(/[\p{Emoji}]/u) || item.categoryName === item.label);
          } catch (e) { throw new Error(`Fail: ${e.message}`); }

  - description: "Should return empty array for no custom labels"
    vars:
      labels: |
        INBOX
        SENT
        TRASH
    assert:
      - type: javascript
        value: |
          const text = typeof output === 'string' ? output : JSON.stringify(output);
          try {
            const start = text.indexOf('[');
            const end = text.lastIndexOf(']');
            const parsed = JSON.parse(text.slice(start, end + 1));
            return Array.isArray(parsed) && parsed.length === 0;
          } catch (e) { return true; }

  - description: "Should handle large label lists"
    vars:
      labels: |
        INBOX
        Client A
        Client B
        Client C
        Project 1
        Project 2
        Project 3
        Invoices
        Legal
        Travel
        Marketing
        Sales
        Support
        Development
        SENT
    assert:
      - type: javascript
        value: |
          const text = typeof output === 'string' ? output : JSON.stringify(output);
          try {
            const start = text.indexOf('[');
            const end = text.lastIndexOf(']');
            const parsed = JSON.parse(text.slice(start, end + 1));
            return Array.isArray(parsed) && parsed.length > 5 && 
                   parsed.every(item => item.label && item.categoryName && item.description && ['HIGH', 'MEDIUM', 'LOW'].includes(item.confidence));
          } catch (e) { throw new Error(`Fail: ${e.message}`); }

  - description: "Should provide meaningful descriptions"
    vars:
      labels: |
        Quarterly Reports
        Team Meetings
        INBOX
    assert:
      - type: javascript
        value: |
          const text = typeof output === 'string' ? output : JSON.stringify(output);
          try {
            const start = text.indexOf('[');
            const end = text.lastIndexOf(']');
            const parsed = JSON.parse(text.slice(start, end + 1));
            return parsed.every(item => item.description && item.description.length > 10);
          } catch (e) { throw new Error(`Fail: ${e.message}`); }