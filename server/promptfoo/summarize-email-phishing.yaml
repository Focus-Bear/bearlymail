  # ─── Edge cases ─────────────────────────────────────────────────────────────

  - description: "Edge case: phishing email with NO urgency keywords — relies on domain mismatch"
    vars:
      isThread: false
      subject: "Your account"
      contextNote: ""
      body: |
        Hello,

        Please log in to your account to complete setup.

        Click here: https://netflix-accounts-portal.ru/login

        Thank you,
        The Team
      phishingSignals:
        # In production, a lookalike domain linking to itself yields NO mismatch —
        # the phishing signal is the lookalike sender domain, and the LLM must
        # flag it WITHOUT a mismatch hint (see PR #2638 review).
        hasDomainMismatch: false
        senderDomain: "netflix-accounts-portal.ru"
        linkedDomains:
          - "netflix-accounts-portal.ru"
        suspiciousKeywords: []
        rawScore: 3
    assert:
      - type: javascript
        value: |
          let parsed;
          try {
            const raw = typeof output === 'string' ? output : JSON.stringify(output);
            const jsonMatch = raw.match(/\{[\s\S]*\}/);
            parsed = JSON.parse(jsonMatch ? jsonMatch[0] : raw);
          } catch(e) {
            throw new Error(`Expected JSON response, got: ${String(output).substring(0, 200)}`);
          }
          if (!parsed.phishing || !parsed.phishing.is_phishing) {
            throw new Error(`Expected phishing detection for .ru domain impersonating Netflix. Got: ${JSON.stringify(parsed.phishing)}`);
          }
          return true;

  - description: "Edge case: casual internal email — all signals clear, should be safe"
    vars:
      isThread: false
      subject: "Team lunch on Friday?"
      contextNote: ""
      body: |
        Hey everyone,

        Anyone keen for team lunch this Friday? Thinking Thai food around 12:30.

        Let me know!
        Priya
      phishingSignals:
        hasDomainMismatch: false
        senderDomain: "company.com"
        linkedDomains: []
        suspiciousKeywords: []
        rawScore: 0
    assert:
      - type: javascript
        value: |
          let parsed;
          try {
            const raw = typeof output === 'string' ? output : JSON.stringify(output);
            const jsonMatch = raw.match(/\{[\s\S]*\}/);
            parsed = JSON.parse(jsonMatch ? jsonMatch[0] : raw);
          } catch(e) {
            throw new Error(`Expected JSON response, got: ${String(output).substring(0, 200)}`);
          }
          if (parsed.phishing && parsed.phishing.is_phishing) {
            throw new Error(`False positive: casual internal email flagged. Reason: ${parsed.phishing?.reason}`);
