          return true;

  - description: "Edge case: legit billing email from matching domain — should not be high confidence"
    vars:
      isThread: false
      subject: "Action required: update your billing details"
      contextNote: ""
      body: |
        Hi Jeremy,

        Your Focus Bear subscription credit card ending in 4242 has expired.

        Please update your payment details to avoid service interruption:
        https://app.focusbear.io/billing

        The Focus Bear Team
      phishingSignals:
        hasDomainMismatch: false
        senderDomain: "focusbear.io"
        linkedDomains:
          - "app.focusbear.io"
        suspiciousKeywords:
          - "update payment/billing"
          - "urgency language"
        rawScore: 2
    assert:
      - type: javascript
        value: |
          let parsed;
          try {
            const raw = typeof output === 'string' ? output : JSON.stringify(output);
            const jsonMatch = raw.match(/\{[\s\S]*\}/);
            parsed = JSON.parse(jsonMatch ? jsonMatch[0] : raw);
          } catch(e) {
            throw new Error(`Expected JSON response, got: ${String(output).substring(0, 200)}`);
          }
          // Should NOT flag at banner-showing confidence (medium/high) — matching domain + legit link
          if (parsed.phishing && parsed.phishing.is_phishing && ['medium', 'high'].includes(parsed.phishing.confidence)) {
            throw new Error(`Over-flagged: legit billing email from matching domain flagged ${parsed.phishing.confidence} confidence. Reason: ${parsed.phishing?.reason}`);
          }
          return true;


  - description: "Legitimate card-payment-declined alert from the brand's own domain — urgency is not phishing"
    vars:
      isThread: false
      subject: "Card payment declined – Insufficient balance ⚠️"
      contextNote: ""
      body: |
        Hi Jeremy M,

        Your card payment was recently declined for the following reason:

        Insufficient balance. Top up the account to avoid further declined payments.

        Find out more:
        https://business.revolut.com/transactions

        Revolut Business
      phishingSignals:
        hasDomainMismatch: false
        senderDomain: "revolut.com"
        linkedDomains:
          - "business.revolut.com"
        suspiciousKeywords:
          - "urgency language"
        rawScore: 1
    assert:
      - type: javascript
        value: |
          let parsed;
          try {
            const raw = typeof output === 'string' ? output : JSON.stringify(output);
            const jsonMatch = raw.match(/\{[\s\S]*\}/);
            parsed = JSON.parse(jsonMatch ? jsonMatch[0] : raw);
          } catch(e) {
            throw new Error(`Expected JSON response, got: ${String(output).substring(0, 200)}`);
          }
          // Medium+ confidence shows the phishing banner in the UI — a matching-domain
          // transactional alert must never reach it (reported false positive).
          if (parsed.phishing && parsed.phishing.is_phishing && ['medium', 'high'].includes(parsed.phishing.confidence)) {
            throw new Error(`Over-flagged: legit transactional alert flagged ${parsed.phishing.confidence}. Reason: ${parsed.phishing?.reason}`);
          }
          return true;

  # ─── Custom prompt path — phishing must still be detected ──────────────────
  # This test uses the check-phishing-only prompt to verify that phishing detection
  # works even when the user has a custom summarisation prompt.

